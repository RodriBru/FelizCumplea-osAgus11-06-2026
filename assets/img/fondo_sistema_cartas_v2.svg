<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#eaf2ef"/>
      <stop offset=".44" stop-color="#f3e9da"/>
      <stop offset="1" stop-color="#cdb69d"/>
    </linearGradient>

    <radialGradient id="glow" cx=".5" cy=".42" r=".58">
      <stop offset="0" stop-color="#fffaf1" stop-opacity=".92"/>
      <stop offset=".55" stop-color="#fff7ec" stop-opacity=".48"/>
      <stop offset="1" stop-color="#fff7ec" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff8e7"/>
      <stop offset=".52" stop-color="#ead8b9"/>
      <stop offset="1" stop-color="#c9a77f"/>
    </linearGradient>

    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#503a2e" flood-opacity=".24"/>
    </filter>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#503a2e" flood-opacity=".18"/>
    </filter>

    <pattern id="grain" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1" fill="#5d4632" opacity=".08"/>
      <circle cx="16" cy="12" r=".7" fill="#fff" opacity=".18"/>
      <circle cx="26" cy="25" r=".7" fill="#604832" opacity=".07"/>
    </pattern>
  </defs>

  <rect width="1080" height="1920" fill="url(#sky)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>
  <rect width="1080" height="1920" fill="url(#grain)" opacity=".42"/>

  <!-- papers around the edges; center intentionally clear -->
  <g opacity=".86" filter="url(#softShadow)">
    <g transform="translate(-95 140) rotate(-11)">
      <rect width="380" height="270" rx="10" fill="url(#paper)"/>
      <path d="M35 58 C120 30 180 80 320 44 M42 98 C124 80 200 119 334 78 M30 143 C112 130 180 162 305 126 M50 188 C145 170 214 216 330 176"
            fill="none" stroke="#765743" stroke-width="6" stroke-linecap="round" opacity=".33"/>
      <circle cx="330" cy="228" r="25" fill="#a74d42" opacity=".72"/>
      <circle cx="330" cy="228" r="15" fill="none" stroke="#f1b19d" stroke-width="3" opacity=".55"/>
    </g>

    <g transform="translate(790 105) rotate(12)">
      <rect width="320" height="230" rx="10" fill="url(#paper)"/>
      <path d="M33 57 C93 42 180 76 275 51 M42 102 C116 82 184 124 286 93 M34 153 C112 134 188 176 280 146"
            fill="none" stroke="#765743" stroke-width="6" stroke-linecap="round" opacity=".31"/>
      <path d="M34 186 C95 170 152 194 231 174" fill="none" stroke="#765743" stroke-width="5" stroke-linecap="round" opacity=".24"/>
    </g>

    <g transform="translate(-120 1320) rotate(9)">
      <rect width="410" height="310" rx="10" fill="url(#paper)"/>
      <path d="M50 78 C152 49 215 102 348 62 M45 124 C142 98 240 152 356 110 M58 178 C150 148 230 207 345 165 M42 229 C122 204 205 252 318 216"
            fill="none" stroke="#765743" stroke-width="6" stroke-linecap="round" opacity=".31"/>
    </g>

    <g transform="translate(818 1370) rotate(-10)">
      <rect width="340" height="260" rx="10" fill="url(#paper)"/>
      <path d="M34 62 C120 46 190 80 295 54 M32 106 C110 92 192 124 286 94 M43 153 C128 137 202 170 301 141 M39 198 C108 179 176 205 252 185"
            fill="none" stroke="#765743" stroke-width="6" stroke-linecap="round" opacity=".28"/>
      <circle cx="286" cy="208" r="26" fill="#8d3c37" opacity=".76"/>
      <path d="M277 207c0-12 17-15 17-3 0-12 17-9 17 3 0 12-17 21-17 21s-17-9-17-21z" fill="#eab1a2" opacity=".7"/>
    </g>
  </g>

  <!-- small floating paper snippets -->
  <g opacity=".42" filter="url(#blur8)">
    <rect x="92" y="560" width="160" height="100" rx="8" fill="#fff5df" transform="rotate(-12 92 560)"/>
    <rect x="845" y="620" width="145" height="92" rx="8" fill="#f4dfbd" transform="rotate(10 845 620)"/>
    <rect x="110" y="970" width="130" height="86" rx="8" fill="#ecd1ab" transform="rotate(6 110 970)"/>
    <rect x="820" y="1040" width="170" height="108" rx="8" fill="#fff0d7" transform="rotate(-8 820 1040)"/>
  </g>

  <!-- decorative soft particles -->
  <g fill="#fff5db" opacity=".58">
    <circle cx="120" cy="400" r="5"/><circle cx="870" cy="410" r="4"/>
    <circle cx="198" cy="1180" r="3"/><circle cx="885" cy="1230" r="5"/>
    <circle cx="490" cy="265" r="4"/><circle cx="612" cy="1540" r="4"/>
    <circle cx="390" cy="118" r="3"/><circle cx="745" cy="1710" r="3"/>
  </g>
</svg>